<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моё Telegram Mini App</title>
    <!-- Подключаем Telegram Web Apps API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        .container {
            text-align: center;
        }
        button {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Привет, Telegram!</h1>
        <div id="user-info">
            <p>Загружаем данные...</p>
        </div>
        <button id="send-data-btn">Отправить данные в бот</button>
        <div id="result"></div>
    </div>

    <script>
        // Инициализируем Telegram Web App
        const tg = window.Telegram.WebApp;

        // Расширяем на весь экран
        tg.expand();

        // Показываем, что приложение готово
        tg.ready();

        // Получаем данные пользователя
        const user = tg.initDataUnsafe.user;

        // Отображаем информацию о пользователе
        const userInfoDiv = document.getElementById('user-info');
        if (user) {
            userInfoDiv.innerHTML = `
                <p><strong>Имя:</strong> ${user.first_name || 'Не указано'}</p>
                <p><strong>Фамилия:</strong> ${user.last_name || 'Не указана'}</p>
                <p><strong>Username:</strong> @${user.username || 'Не указан'}</p>
                <p><strong>ID:</strong> ${user.id}</p>
            `;
        } else {
            userInfoDiv.innerHTML = '<p>Не удалось получить данные пользователя</p>';
        }

        // Обработчик кнопки для отправки данных в бот
        document.getElementById('send-data-btn').addEventListener('click', function() {
            // Отправляем данные в бот через метод sendData
            tg.sendData(JSON.stringify({
                action: 'user_action',
                userId: user?.id,
                timestamp: Date.now()
            }));

            // Показываем результат
            document.getElementById('result').innerHTML =
                '<p style="color: green; margin-top: 10px;">Данные отправлены в бот!</p>';
        });
    </script>
</body>
</html>

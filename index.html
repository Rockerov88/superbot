<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Супер Тест</title>
    <!-- Подключаем скрипт Telegram Mini Apps -->
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #222222);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color, #ffffff);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
            transition: transform 0.2s;
        }
        h1 { font-size: 24px; margin-bottom: 10px; color: var(--tg-theme-button-color, #248bed); }
        p { font-size: 16px; opacity: 0.8; line-height: 1.5; }
        
        /* Стильные кнопки вариантов */
        .btn {
            background-color: var(--tg-theme-button-color, #248bed);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: all 0.1s ease;
        }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🎯 Интеллектуальный Квиз</h1>
        <p>Добро пожаловать! Тебя ждет интерактивный тест с крутым оформлением прямо внутри Telegram.</p>
        
        <!-- Кнопка для теста -->
        <button class="btn" id="start-btn">Начать тест</button>
    </div>

    <script>
        // Инициализируем Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Раскрываем приложение на весь экран телефона

        document.getElementById('start-btn').addEventListener('click', () => {
            // Вибрация на телефоне при нажатии (лёгкий клик)
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
            alert('Тест начался! Тут мы будем переключать вопросы.');
        });
    </script>
</body>
</html>
